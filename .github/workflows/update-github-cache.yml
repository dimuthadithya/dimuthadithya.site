name: Update GitHub Cache

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the generated JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME || 'dimuthadithya' }}
          GITHUB_PROJECT_TAGS: ${{ secrets.GITHUB_PROJECT_TAGS || 'portfolio,project,showcase' }}
        run: npm run fetch-github

      - name: Commit updated cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-data.json
          git diff --staged --quiet || git commit -m "chore: update GitHub data cache [skip ci]"
          git push
